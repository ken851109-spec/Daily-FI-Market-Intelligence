<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily FI Market Intelligence - Maintenance</title>
    <link rel="icon" type="image/svg+xml" href="/Daily-FI-Tape/favicon.svg" />
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
        background: #f6f8fc;
        color: #172033;
        display: grid;
        place-items: center;
        padding: 2rem;
      }

      .maintenance {
        width: min(680px, 100%);
        background: #ffffff;
        border: 1px solid #d9e0ec;
        border-radius: 14px;
        padding: 2rem;
        box-shadow: 0 12px 28px rgba(19, 42, 74, 0.07);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.6rem, 4vw, 2rem);
        font-weight: 700;
      }

      p {
        margin: 1rem 0 0;
        line-height: 1.7;
      }

      .meta {
        color: #556072;
        font-size: 0.95rem;
        margin-top: 1rem;
      }

      .pill {
        display: inline-block;
        margin-top: 0.9rem;
        font-weight: 600;
        font-size: 0.88rem;
        border-radius: 999px;
        padding: 0.2rem 0.75rem;
        color: #2f4b6f;
        background: #edf3ff;
      }
    </style>
  </head>
  <body>
    <main class="maintenance">
      <h1>Daily FI Market Intelligence is under maintenance</h1>
      <p>
        We are currently updating the site. The production report output will be
        restored when the maintenance cycle is complete.
      </p>
      <p class="meta">Site: Daily FI Market Intelligence</p>
      <span class="pill">Checked in progress. Please check back shortly.</span>
    </main>
  </body>
</html>
