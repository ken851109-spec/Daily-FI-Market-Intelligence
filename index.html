<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daily FI Market Tape</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <header class="reader-bar">
    <div class="reader-brand">
      <span class="reader-mark">FI</span>
      <div>
        <h1>Daily FI Market Tape</h1>
        <p id="activeTapeLabel">載入報告中</p>
      </div>
    </div>
    <div class="reader-controls" aria-label="Report controls">
      <select id="tapeSelect" class="control control-select" aria-label="選擇歷史報告"></select>
      <input id="searchInput" class="control control-search" type="search" placeholder="搜尋本篇內容">
      <a id="openArchiveLink" class="archive-link" href="#" target="_blank" rel="noopener">原始版</a>
    </div>
  </header>

  <main class="reader-layout">
    <aside class="reader-side" aria-label="歷史報告與章節">
      <section class="side-block">
        <h2>歷史報告</h2>
        <div id="archiveList" class="archive-list"></div>
      </section>
      <section class="side-block">
        <h2>章節</h2>
        <nav id="sectionNav" class="section-nav"></nav>
      </section>
    </aside>

    <section class="report-frame-wrap" aria-live="polite">
      <div id="statusPanel" class="status-panel">
        <h2>載入報告中</h2>
      </div>
      <iframe id="reportFrame" class="report-frame" title="Daily FI Market Tape report"></iframe>
    </section>
  </main>

  <script src="assets/app.js"></script>
</body>
</html>
