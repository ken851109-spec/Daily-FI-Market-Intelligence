<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Daily FI Tape | Under Maintenance</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7f8;
        color: #172126;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      main {
        width: min(560px, 100%);
      }

      .eyebrow {
        margin: 0 0 16px;
        color: #56636b;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(36px, 6vw, 64px);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 24px 0 0;
        color: #3d4a52;
        font-size: 18px;
        line-height: 1.6;
      }

      .status {
        margin-top: 32px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: #1d5c46;
        font-size: 15px;
        font-weight: 700;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #28a06d;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Daily FI Tape</p>
      <h1>Under maintenance</h1>
      <p>
        The Daily FI Tape site is temporarily offline while the latest public report
        surface is reviewed.
      </p>
      <div class="status" aria-label="Maintenance status">
        <span class="dot" aria-hidden="true"></span>
        Maintenance mode active
      </div>
    </main>
  </body>
</html>
