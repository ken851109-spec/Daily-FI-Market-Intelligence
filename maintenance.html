<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Daily FI Tape | Under Maintenance</title>
<style>
:root {
  color-scheme: light;
  --bg: #eef3f6;
  --panel: #ffffff;
  --ink: #102235;
  --muted: #5f7183;
  --line: #d7e1ea;
  --accent: #9a612c;
  --accent-soft: #f4e6d8;
  font-family: Inter, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", "Segoe UI", Arial, sans-serif;
  font-variant-numeric: tabular-nums;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 28px;
  background:
    linear-gradient(135deg, rgba(16, 34, 53, 0.08), transparent 42%),
    var(--bg);
  color: var(--ink);
}
main {
  width: min(820px, 100%);
  padding: clamp(28px, 5vw, 56px);
  border: 1px solid var(--line);
  border-radius: 18px;
  background: var(--panel);
  box-shadow: 0 22px 60px rgba(16, 34, 53, 0.10);
}
.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin: 0 0 22px;
  color: var(--accent);
  font-size: 13px;
  font-weight: 800;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.eyebrow::before {
  content: "";
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 8px var(--accent-soft);
}
h1 {
  margin: 0;
  max-width: 13ch;
  font-size: clamp(42px, 8vw, 74px);
  line-height: .96;
  letter-spacing: 0;
}
.lead {
  margin: 24px 0 0;
  max-width: 660px;
  color: var(--muted);
  font-size: clamp(18px, 2.4vw, 23px);
  line-height: 1.55;
  font-weight: 600;
}
.status {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 1px;
  margin: 34px 0 0;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: var(--line);
}
.status div {
  min-height: 92px;
  padding: 18px;
  background: #f9fbfc;
}
.status strong {
  display: block;
  color: var(--ink);
  font-size: 18px;
  line-height: 1.25;
}
.status span {
  display: block;
  margin-top: 8px;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.4;
}
.note {
  margin: 28px 0 0;
  padding-top: 18px;
  border-top: 1px solid var(--line);
  color: var(--muted);
  font-size: 15px;
  line-height: 1.65;
}
@media (max-width: 640px) {
  body { padding: 16px; place-items: stretch; align-items: center; }
  main { border-radius: 14px; }
  h1 { max-width: 10ch; }
  .status { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<main aria-labelledby="title">
  <p class="eyebrow">Daily FI Tape</p>
  <h1 id="title">Under Maintenance</h1>
  <p class="lead">Daily FI Tape is temporarily unavailable. Please check back later.</p>
  <p class="note">The public Daily FI Tape page is currently under maintenance.</p>
</main>
</body>
</html>
